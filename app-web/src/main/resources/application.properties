# Spring Boot Application Configuration
# Replaces JBoss deployment descriptors and struts-config.xml

# Server Configuration (replaces JBoss server configuration)
server.port=8080
server.servlet.context-path=/

# Thymeleaf Configuration (replaces JSP configuration)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Logging Configuration (replaces commons-logging)
logging.level.com.example=DEBUG
logging.level.org.springframework.web=INFO

