<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>
</head>
<body>
    <div align="center">
        <h1>User Registration</h1>

        <!-- Spring MVC form with Java 21 record (replaces Struts html:form) -->
        <form th:action="@{/register}" method="post" th:object="${registrationDTO}">
            <table>
                <tr>
                    <td>Username:</td>
                    <td><input type="text" th:field="*{username}" required /></td>
                </tr>
                <tr>
                    <td>Password:</td>
                    <td><input type="password" th:field="*{password}" required /></td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Register" />
                    </td>
                </tr>
            </table>
        </form>

        <br/>
        <a th:href="@{/}">Back to Home</a>
    </div>
</body>
</html>
