# Spring Boot configuration — replaces all JBoss/J2EE deployment descriptors
spring.application.name=legacy-app-modernized

# H2 in-memory database (replaces container-managed datasource)
spring.datasource.url=jdbc:h2:mem:appdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console for development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf (replaces JSP + Struts tag libraries)
spring.thymeleaf.cache=false

# Server
server.port=8080
server.servlet.session.timeout=30m
