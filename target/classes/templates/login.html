<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <div style="text-align: center">
        <h1>Login</h1>

        <div th:if="${param.error}" style="color: red">Invalid email or password.</div>
        <div th:if="${param.logout}" style="color: green">You have been logged out.</div>

        <form th:action="@{/login}" method="post">
            E-mail: <input type="email" name="username" required /><br/>
            Password: <input type="password" name="password" required /><br/>
            <input type="submit" value="Send" />
        </form>

        <p><a th:href="@{/}">Back</a></p>
    </div>
</body>
</html>
