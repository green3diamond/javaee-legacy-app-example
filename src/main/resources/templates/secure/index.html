<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Secure Area</title>
</head>
<body>
<div align="center">
	<h1>You are secure!</h1>
		<h2>Hello, <span th:text="${#authentication?.name ?: 'user'}">user</span>!</h2>
	<p/>
	<form th:action="@{/jaas/logoff}" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<input type="submit" value="Sair"/>
	</form>
	<p/>
	<a th:href="@{/}">Voltar</a>
</div>
</body>
</html>
