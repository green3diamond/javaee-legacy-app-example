<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Georgia, "Times New Roman", serif;
            background: linear-gradient(180deg, #fdf8ef, #f0eadf);
            color: #1f2937;
        }
        form, section {
            width: min(520px, calc(100% - 2rem));
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }
        label {
            display: block;
            margin-top: 1rem;
            font-weight: 600;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            margin-top: 0.35rem;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            border: 1px solid #d1d5db;
        }
        button, a {
            display: inline-block;
            margin-top: 1.25rem;
            background: #14532d;
            color: white;
            border: 0;
            border-radius: 999px;
            padding: 0.85rem 1.2rem;
            text-decoration: none;
        }
        .error {
            color: #991b1b;
            margin-top: 1rem;
        }
        ul {
            color: #991b1b;
        }
    </style>
</head>
<body>
<section>
    <h1>Create an account</h1>
    <p>The original app ignored submitted values. The modern flow persists validated accounts in H2.</p>
    <form th:action="@{/register}" method="post" th:object="${registrationRequest}">
        <label for="displayName">Display name</label>
        <input id="displayName" type="text" th:field="*{displayName}" autocomplete="name">

        <label for="email">Email</label>
        <input id="email" type="email" th:field="*{email}" autocomplete="email">

        <label for="password">Password</label>
        <input id="password" type="password" th:field="*{password}" autocomplete="new-password">

        <button type="submit">Register</button>
        <a th:href="@{/}">Back</a>
    </form>

    <p class="error" th:if="${registrationError}" th:text="${registrationError}"></p>
    <ul th:if="${#fields.hasErrors('*')}">
        <li th:each="error : ${#fields.errors('*')}" th:text="${error}"></li>
    </ul>
</section>
</body>
</html>
